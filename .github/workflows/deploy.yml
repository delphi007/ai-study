name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git .quartz
          rm -rf .quartz/.git

      - name: Install Quartz dependencies
        run: cd .quartz && npm install

      - name: Copy content
        run: |
          mkdir -p .quartz/content/00-总览 ".quartz/content/Claude Code"
          cp "00-总览/AI学习知识库总览.md" ".quartz/content/00-总览/"
          cp "Claude Code/"*.md ".quartz/content/Claude Code/"

      - name: Build Quartz
        run: cd .quartz && npx quartz build --output ../_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
